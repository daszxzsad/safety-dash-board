<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNCT 외주작업 현황</title>
<style>
  :root{
    --bg:#eef1f7; --panel:#ffffff; --panel2:#ffffff;
    --line:rgba(20,32,60,.10); --text:#16233d; --muted:#5b6b86;
    --navy:#1d4ed8; --navy2:#3b82f6;
    --warn:#b45309; --warn-bg:rgba(245,158,11,.16);
    --ok:#15803d; --ok-bg:rgba(34,197,94,.16);
    --danger:#dc2626;
    --shadow:0 6px 22px rgba(20,32,60,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'맑은 고딕','Malgun Gothic',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#e3e9f6 0%,var(--bg) 60%);
    color:var(--text); min-height:100vh; padding:26px 30px 50px;
  }

  /* ===== Header ===== */
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:16px}
  .logo{
    width:60px;height:60px;border-radius:14px;flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy2));
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:20px;letter-spacing:1px;
    box-shadow:0 8px 24px rgba(29,78,216,.35);
  }
  .brand h1{font-size:30px;font-weight:900;line-height:1.15}
  .brand .sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:600}
  .brand .eng{font-size:11px;color:var(--muted);letter-spacing:.6px;margin-top:2px;opacity:.75}

  .clockbox{text-align:right}
  .clock{font-size:40px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px}
  .today{font-size:14px;color:var(--muted);margin-top:2px;font-weight:600}
  .live{
    display:inline-flex;align-items:center;gap:7px;margin-top:8px;
    padding:5px 12px;border-radius:999px;background:var(--ok-bg);
    color:var(--ok);font-size:12px;font-weight:800;
  }
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:blink 1.4s infinite}
  .live.off{background:rgba(239,68,68,.14);color:var(--danger)}
  .live.off .dot{background:var(--danger);animation:none}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* ===== Stats ===== */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px}
  .stat{
    background:var(--panel);box-shadow:var(--shadow);
    border:1px solid var(--line);border-radius:18px;padding:22px 26px;
    display:flex;flex-direction:column;gap:6px;
  }
  .stat .label{font-size:14px;color:var(--muted);font-weight:700}
  .stat .num{font-size:46px;font-weight:900;line-height:1}
  .stat .num small{font-size:18px;font-weight:800;color:var(--muted);margin-left:4px}
  .stat.s1 .num{color:var(--navy)}
  .stat.s2 .num{color:var(--warn)}
  .stat.s3 .num{color:var(--ok)}

  /* ===== Controls ===== */
  .ctrl{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:34px 0 16px;flex-wrap:wrap}
  .ctrl h2{font-size:22px;font-weight:900}
  .ctrl .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  input[type=date],.btn{
    font-family:inherit;font-size:14px;font-weight:700;
    background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;
  }
  .btn:hover{border-color:var(--navy2)}
  .btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
  input[type=date]{color-scheme:light}

  #errbar{
    display:none;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.35);
    color:#b91c1c;border-radius:12px;padding:14px 18px;font-size:14px;font-weight:600;line-height:1.6;margin-bottom:16px;
  }

  /* ===== Cards ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:24px}
  .card{
    position:relative;background:var(--panel);box-shadow:var(--shadow);
    border:1px solid var(--line);border-left:8px solid var(--warn);
    border-radius:20px;padding:30px 32px 28px;animation:pop .5s ease;
  }
  .card.signed{border-left-color:var(--ok)}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card .company{font-size:32px;font-weight:900;line-height:1.25;padding-right:54px;word-break:keep-all;margin-bottom:4px}
  .card .rows{margin-top:18px;display:flex;flex-direction:column;gap:0}
  .card .row{display:flex;gap:16px;font-size:18px;align-items:flex-start;padding:13px 0;border-top:1px solid var(--line)}
  .card .row:first-child{border-top:none}
  .card .row .lbl{width:86px;flex-shrink:0;color:var(--muted);font-weight:700;font-size:15px;padding-top:1px}
  .card .row .v{flex:1;font-weight:800;color:var(--text);word-break:break-word;line-height:1.45}
  .badge{
    display:inline-flex;align-items:center;gap:9px;margin-top:22px;
    padding:11px 20px;border-radius:999px;font-size:16px;font-weight:900;
    background:var(--warn-bg);color:var(--warn);
  }
  .badge .d{width:8px;height:8px;border-radius:50%;background:var(--warn);animation:blink 1.4s infinite}
  .card.signed .badge{background:var(--ok-bg);color:var(--ok)}
  .card.signed .badge .d{background:var(--ok);animation:none}

  .del{
    position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:11px;
    background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
    color:var(--danger);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
  .del:disabled{opacity:.4;cursor:default}

  .empty{
    grid-column:1/-1;text-align:center;color:var(--muted);
    padding:70px 0;font-size:16px;font-weight:600;
  }
  .empty .big{font-size:42px;margin-bottom:10px;opacity:.5}
</style>
</head>
<body>

  <div class="top">
    <div class="brand">
      <div class="logo">BNCT</div>
      <div>
        <h1>외주작업 현황 대시보드</h1>
        <div class="sub">자산관리팀 · CONTRACTOR WORK STATUS</div>
        <div class="eng">BUSAN NEW CONTAINER TERMINAL</div>
      </div>
    </div>
    <div class="clockbox">
      <div class="clock" id="clock">--:--:--</div>
      <div class="today" id="todayTxt">----년 --월 --일</div>
      <div class="live" id="live"><span class="dot"></span><span id="liveTxt">실시간 연동</span></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat s1"><div class="label">금일 작업 업체</div><div class="num"><span id="stCompany">0</span><small>팀</small></div></div>
    <div class="stat s2"><div class="label">작업진행중</div><div class="num"><span id="stPending">0</span><small>건</small></div></div>
    <div class="stat s3"><div class="label">작업완료</div><div class="num"><span id="stDone">0</span><small>건</small></div></div>
  </div>

  <div class="ctrl">
    <h2 id="gridTitle">금일 작업 현황</h2>
    <div class="right">
      <input type="date" id="datePick">
      <button class="btn" id="btnToday">오늘</button>
      <button class="btn primary" id="btnRefresh">↻ 새로고침</button>
    </div>
  </div>

  <div id="errbar"></div>
  <div class="grid" id="cards">
    <div class="empty"><div class="big">⏳</div>갱신 대기…</div>
  </div>

<script>
/* ===================== 설정 ===================== */
// API는 Supabase 키가 들어있는 bnct-safety 프로젝트에 둔다(여기 safety-dash-board가 아님).
var API_BASE   = 'https://bnct-safety.vercel.app';
var LIST_URL   = API_BASE + '/api/list-permits';
var DELETE_URL = API_BASE + '/api/delete-permit';
var REFRESH_MS = 15000;          // 15초 자동 갱신

/* ===================== 시간(KST) ===================== */
function nowKST(){ var n=new Date(); return new Date(n.getTime()+(n.getTimezoneOffset()*60000)+(9*3600000)); }
function pad(n){ return (n<10?'0':'')+n; }
function kstDateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function tickClock(){
  var k=nowKST();
  document.getElementById('clock').textContent   = pad(k.getHours())+':'+pad(k.getMinutes())+':'+pad(k.getSeconds());
  document.getElementById('todayTxt').textContent= k.getFullYear()+'년 '+pad(k.getMonth()+1)+'월 '+pad(k.getDate())+'일';
}

/* ===================== 유틸 ===================== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

// 행(row) + 내부 JSON들을 전부 펼쳐서 키-값 한 뭉치로 모음 (필드명이 뭐든 잡히게)
function flatten(row){
  var bag={};
  function dig(o){
    if(!o || typeof o!=='object') return;
    for(var k in o){
      var v=o[k];
      if(v && typeof v==='object'){ dig(v); }
      else if(typeof v==='string' && (v.charAt(0)==='{'||v.charAt(0)==='[')){
        try{ dig(JSON.parse(v)); }catch(e){ bag[k]=v; }
      } else { if(bag[k]==null||bag[k]==='') bag[k]=v; }
    }
  }
  dig(row);
  return bag;
}
// 후보 키 패턴들 중 처음 매칭되는 값
function pick(bag, patterns){
  for(var p=0;p<patterns.length;p++){
    var re=patterns[p];
    for(var k in bag){
      if(re.test(k) && bag[k]!=null && String(bag[k]).trim()!==''){ return String(bag[k]); }
    }
  }
  return '';
}

// managers 필드를 사람 이름 문자열로 정리 (배열/객체/JSON문자열 모두 대응)
function fmtManagers(v){
  if(v==null||v==='') return '';
  if(typeof v==='string' && (v.charAt(0)==='['||v.charAt(0)==='{')){
    try{ return fmtManagers(JSON.parse(v)); }catch(e){ return v; }
  }
  if(Array.isArray(v)){
    return v.map(function(m){
      if(m && typeof m==='object'){ return m.name||m.이름||m.manager||m.담당자||m.성명||Object.values(m)[0]||''; }
      return String(m);
    }).filter(Boolean).join(', ');
  }
  if(typeof v==='object'){ return Object.values(v).filter(function(x){return typeof x==='string';}).join(', '); }
  return String(v);
}

function extract(row){
  var bag=flatten(row);
  return {
    id      : row.id!=null ? row.id : (row.token||null),
    token   : row.token||null,
    company : row.company_name || pick(bag,[/업체|회사|company|contractor|vendor/i]) || '(업체명 미상)',
    work    : row.project_name || pick(bag,[/작업명|공사명|작업내용|project|work|job|title/i]),
    place   : pick(bag,[/장소|위치|구역|place|location|area|site/i]),
    person  : fmtManagers(row.managers) || pick(bag,[/담당|책임|감독|성명|이름|responsible|manager|작성자/i]),
    workers : (row.worker_count!=null && row.worker_count!=='') ? String(row.worker_count) : pick(bag,[/인원|worker_count|인부|작업자/i]),
    time    : row.submit_date || row.created_at || pick(bag,[/시작.*시간|작업.*시간|start|시간|time/i]),
    signed  : /signed|complete|done|approved|승인|완료|서명/i.test(String(row.status||'')) || !!(row.signed_at),
    deleted : !!(row.deleted_at || row.deletedAt)
  };
}
function fmtTime(s){
  if(!s) return '';
  var d=new Date(s);
  if(isNaN(d)) return String(s);                       // 이미 "14:30" 같은 텍스트면 그대로
  var k=new Date(d.getTime()+(d.getTimezoneOffset()*60000)+(9*3600000)); // KST로 환산
  return pad(k.getHours())+':'+pad(k.getMinutes());
}

/* ===================== 렌더 ===================== */
function render(rows){
  // 삭제(소프트삭제)된 건 숨김
  var list = rows.filter(function(r){ return !extract(r).deleted; });

  var companies={}, pending=0, done=0, html='';
  list.forEach(function(r){
    var e=extract(r);
    if(e.company) companies[e.company]=1;
    if(e.signed) done++; else pending++;

    var idAttr = e.id!=null ? ' data-id="'+esc(e.id)+'"' : '';
    var tkAttr = e.token ? ' data-token="'+esc(e.token)+'"' : '';
    function rowH(label, val){
      return val ? '<div class="row"><span class="lbl">'+label+'</span><span class="v">'+esc(val)+'</span></div>' : '';
    }
    html+=''+
      '<div class="card '+(e.signed?'signed':'')+'"'+idAttr+tkAttr+'>'+
        '<button class="del" title="작업 삭제" onclick="delWork(this)">🗑</button>'+
        '<div class="company">'+esc(e.company)+'</div>'+
        '<div class="rows">'+
          rowH('작업명',   e.work)+
          rowH('작업장소', e.place)+
          rowH('담당자',   e.person)+
          rowH('작업인원', e.workers ? (e.workers+'명') : '')+
          rowH('접수시각', fmtTime(e.time))+
        '</div>'+
        '<div class="badge"><span class="d"></span>'+(e.signed?'작업완료':'작업진행중')+'</div>'+
      '</div>';
  });

  document.getElementById('stCompany').textContent = Object.keys(companies).length;
  document.getElementById('stPending').textContent = pending;
  document.getElementById('stDone').textContent    = done;

  document.getElementById('cards').innerHTML = html ||
    '<div class="empty"><div class="big">📋</div>해당 날짜에 등록된 외주작업이 없습니다.</div>';
}

/* ===================== 삭제(소프트) ===================== */
async function delWork(btn){
  var card=btn.closest('.card');
  var id=card.getAttribute('data-id');
  var token=card.getAttribute('data-token');
  var name=(card.querySelector('.company')||{}).textContent||'이 작업';

  if(!confirm('“'+name+'” 작업을 목록에서 삭제할까요?\n\n· 화면에서 숨겨집니다 (중복/오기재 정리용)\n· 기록은 DB에 남아 나중에 복구 가능합니다.')) return;

  btn.disabled=true; btn.textContent='…';
  // 토큰이 가장 확실한 고유키(항상 존재) → 토큰 우선. id는 UUID 형식일 때만 사용.
  var isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  var body={};
  if(token){ body.token=token; }
  else if(id){ body.id = isUuid.test(id) ? id : (isNaN(+id)? id : +id); }

  try{
    var res=await fetch(DELETE_URL,{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    var data=await res.json().catch(function(){return{};});
    if(!res.ok || !data.success){
      throw new Error((data && data.error) ? data.error : ('HTTP '+res.status));
    }
    // 즉시 화면에서 제거 후 새로고침
    card.style.transition='.25s'; card.style.opacity='0'; card.style.transform='scale(.96)';
    setTimeout(load, 250);
  }catch(err){
    btn.disabled=false; btn.textContent='🗑';
    alert('삭제 실패: '+err.message+'\n\n(서버에 api/delete-permit.js 가 올라가 있고, permits 테이블에 deleted_at 칼럼이 있는지 확인하세요.)');
  }
}

/* ===================== 데이터 로드 ===================== */
async function load(){
  var dateStr=document.getElementById('datePick').value || kstDateStr(nowKST());
  var isToday = (dateStr===kstDateStr(nowKST()));
  document.getElementById('gridTitle').textContent = isToday ? '금일 작업 현황' : (dateStr+' 작업 현황');

  try{
    var res=await fetch(LIST_URL+'?date='+encodeURIComponent(dateStr),{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status+' '+(await res.text()).slice(0,160));
    var data=await res.json();
    var rows = Array.isArray(data) ? data : (data.permits||data.data||[]);
    render(rows);

    document.getElementById('errbar').style.display='none';
    var live=document.getElementById('live'); live.className='live';
    document.getElementById('liveTxt').textContent='실시간 연동';
  }catch(err){
    var bar=document.getElementById('errbar'); bar.style.display='block';
    bar.innerHTML='⚠ 데이터를 불러오지 못했습니다 — '+esc(err.message)+
      '<br>· '+esc(LIST_URL)+' 가 정상 응답하는지, Supabase 읽기 권한(RLS)을 확인하세요.';
    var live=document.getElementById('live'); live.className='live off';
    document.getElementById('liveTxt').textContent='연결 오류';
  }
}

/* ===================== 시작 ===================== */
tickClock(); setInterval(tickClock,1000);
document.getElementById('datePick').value=kstDateStr(nowKST());
document.getElementById('btnRefresh').addEventListener('click',load);
document.getElementById('btnToday').addEventListener('click',function(){
  document.getElementById('datePick').value=kstDateStr(nowKST()); load();
});
document.getElementById('datePick').addEventListener('change',load);
load(); setInterval(load,REFRESH_MS);
</script>
</body>
</html>
