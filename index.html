<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNCT 외주작업 현황</title>
<style>
  :root{
    --bg:#070b14;
    --bg2:#0c1322;
    --panel:#111a2e;
    --panel2:#16223a;
    --line:#22324f;
    --txt:#eaf2ff;
    --txt-dim:#8ba0c4;
    --txt-mute:#5d7099;
    --cyan:#22d3ee;
    --cyan-soft:#0e7490;
    --amber:#fbbf24;
    --amber-bg:rgba(251,191,36,.12);
    --green:#34d399;
    --green-bg:rgba(52,211,153,.12);
    --red:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'맑은 고딕','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(52,211,153,.08), transparent 55%),
      var(--bg);
    color:var(--txt);
    min-height:100vh;
    padding:clamp(16px,1.6vw,32px);
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .wrap{position:relative;z-index:1;max-width:2400px;margin:0 auto;}

  /* ===== HEADER ===== */
  header{
    display:flex;align-items:center;justify-content:space-between;gap:24px;
    padding:clamp(14px,1.4vw,24px) clamp(18px,1.8vw,34px);
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
  }
  .brand{display:flex;align-items:center;gap:clamp(14px,1.2vw,22px);min-width:0;}
  .logo{
    display:flex;align-items:center;justify-content:center;
    width:clamp(58px,4.4vw,84px);height:clamp(58px,4.4vw,84px);
    border-radius:16px;flex-shrink:0;
    background:linear-gradient(135deg,#0891b2,#155e75);
    border:1px solid rgba(34,211,238,.45);
    box-shadow:0 0 28px rgba(34,211,238,.30), inset 0 1px 0 rgba(255,255,255,.18);
    font-weight:800;letter-spacing:1px;color:#eafcff;
    font-size:clamp(15px,1.3vw,22px);
  }
  .titles{min-width:0;}
  .titles .t-sub{font-size:clamp(11px,.9vw,15px);color:var(--cyan);letter-spacing:3px;font-weight:700;}
  .titles .t-main{font-size:clamp(22px,2.3vw,42px);font-weight:800;line-height:1.05;margin-top:2px;
    text-shadow:0 2px 18px rgba(0,0,0,.5);white-space:nowrap;}
  .titles .t-eng{font-size:clamp(10px,.8vw,13px);color:var(--txt-mute);letter-spacing:2px;margin-top:4px;}

  .clockbox{text-align:right;flex-shrink:0;}
  .clock{font-size:clamp(30px,3.4vw,62px);font-weight:800;line-height:1;letter-spacing:1px;
    font-variant-numeric:tabular-nums;text-shadow:0 0 24px rgba(34,211,238,.25);}
  .date{font-size:clamp(13px,1.1vw,20px);color:var(--txt-dim);margin-top:6px;font-weight:600;}
  .live{display:inline-flex;align-items:center;gap:8px;margin-top:8px;font-size:clamp(11px,.85vw,14px);
    color:var(--green);font-weight:700;letter-spacing:1px;}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 0 rgba(52,211,153,.7);animation:ping 1.8s infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);}70%{box-shadow:0 0 0 12px rgba(52,211,153,0);}100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}}

  /* ===== SUMMARY STRIP ===== */
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,1.2vw,22px);margin:clamp(14px,1.4vw,24px) 0;}
  .stat{
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:16px;
    padding:clamp(14px,1.3vw,24px) clamp(18px,1.6vw,30px);
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    box-shadow:0 12px 34px rgba(0,0,0,.35);
  }
  .stat .lbl{font-size:clamp(13px,1.1vw,20px);color:var(--txt-dim);font-weight:700;letter-spacing:1px;}
  .stat .num{font-size:clamp(38px,4.2vw,74px);font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .stat.total .num{color:var(--cyan);}
  .stat.prog .num{color:var(--amber);}
  .stat.done .num{color:var(--green);}
  .stat .unit{font-size:clamp(14px,1.1vw,22px);color:var(--txt-mute);font-weight:700;margin-left:4px;}

  /* ===== CONTROLS ===== */
  .controls{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:clamp(12px,1.2vw,20px);flex-wrap:wrap;}
  .controls .sec-title{font-size:clamp(16px,1.5vw,26px);font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:12px;}
  .controls .sec-title::before{content:"";width:6px;height:clamp(20px,1.8vw,30px);border-radius:3px;background:var(--cyan);box-shadow:0 0 14px var(--cyan);}
  .ctl-right{display:flex;align-items:center;gap:10px;}
  .btn,.dateinput{
    font-family:inherit;font-size:clamp(13px,1vw,17px);font-weight:700;color:var(--txt);
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;
    padding:clamp(9px,.8vw,13px) clamp(14px,1.1vw,20px);cursor:pointer;transition:.15s;
  }
  .btn:hover{background:#1d2c48;border-color:var(--cyan-soft);}
  .dateinput{color-scheme:dark;}
  .updated{font-size:clamp(11px,.85vw,15px);color:var(--txt-mute);font-weight:600;}

  /* ===== ERROR BANNER ===== */
  #errbar{display:none;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);
    color:#fecaca;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:clamp(13px,1vw,16px);line-height:1.5;}

  /* ===== CARDS GRID ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:clamp(14px,1.3vw,24px);}
  .card{
    position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:18px;
    padding:clamp(20px,1.7vw,30px) clamp(22px,1.9vw,34px);
    box-shadow:0 16px 44px rgba(0,0,0,.4);
    border-left:10px solid var(--amber);
  }
  .card.done{border-left-color:var(--green);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .company{font-size:clamp(26px,2.5vw,46px);font-weight:800;line-height:1.1;letter-spacing:-.5px;
    text-shadow:0 2px 14px rgba(0,0,0,.5);word-break:keep-all;}
  .badge{flex-shrink:0;display:inline-flex;align-items:center;gap:9px;white-space:nowrap;
    font-size:clamp(14px,1.15vw,20px);font-weight:800;letter-spacing:.5px;
    padding:clamp(8px,.7vw,12px) clamp(13px,1.1vw,18px);border-radius:999px;}
  .badge.prog{color:var(--amber);background:var(--amber-bg);border:1px solid rgba(251,191,36,.4);}
  .badge.done{color:var(--green);background:var(--green-bg);border:1px solid rgba(52,211,153,.4);}
  .badge .bdot{width:11px;height:11px;border-radius:50%;background:currentColor;}
  .badge.prog .bdot{animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

  .rows{margin-top:clamp(16px,1.4vw,24px);display:grid;gap:clamp(10px,.9vw,15px);}
  .row{display:flex;align-items:baseline;gap:14px;}
  .row .k{flex-shrink:0;width:clamp(82px,7vw,118px);font-size:clamp(13px,1.05vw,18px);
    color:var(--txt-mute);font-weight:700;letter-spacing:1px;}
  .row .v{font-size:clamp(17px,1.5vw,26px);font-weight:700;color:var(--txt);line-height:1.25;word-break:keep-all;}
  .row .v.time{color:var(--cyan);font-variant-numeric:tabular-nums;}
  .row .v .chip{display:inline-block;margin-left:10px;font-size:clamp(11px,.85vw,14px);font-weight:700;
    color:var(--txt-dim);background:rgba(255,255,255,.05);border:1px solid var(--line);
    padding:3px 10px;border-radius:8px;vertical-align:middle;}

  .card.is-new{animation:flashin 1.1s ease-out 2;}
  @keyframes flashin{0%{box-shadow:0 0 0 3px var(--cyan),0 16px 44px rgba(0,0,0,.4);transform:scale(1.012);}
    100%{box-shadow:0 16px 44px rgba(0,0,0,.4);transform:scale(1);}}

  /* ===== EMPTY ===== */
  .empty{grid-column:1/-1;text-align:center;padding:clamp(60px,7vw,120px) 20px;
    border:1.5px dashed var(--line);border-radius:20px;background:rgba(255,255,255,.015);}
  .empty .ico{font-size:clamp(48px,5vw,86px);opacity:.5;}
  .empty .msg{margin-top:18px;font-size:clamp(18px,1.8vw,30px);font-weight:700;color:var(--txt-dim);}
  .empty .sub{margin-top:8px;font-size:clamp(13px,1.1vw,18px);color:var(--txt-mute);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">BNCT</div>
      <div class="titles">
        <div class="t-sub">자산관리팀</div>
        <div class="t-main">외주작업 현황 대시보드</div>
        <div class="t-eng">BUSAN NEW CONTAINER TERMINAL · CONTRACTOR WORK STATUS</div>
      </div>
    </div>
    <div class="clockbox">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="today">----년 --월 --일</div>
      <div class="live"><span class="dot"></span><span id="liveTxt">실시간 연동</span></div>
    </div>
  </header>

  <div class="summary">
    <div class="stat total"><span class="lbl">금일 작업 업체</span><span><span class="num" id="cTotal">0</span><span class="unit">팀</span></span></div>
    <div class="stat prog"><span class="lbl">결재 진행중</span><span><span class="num" id="cProg">0</span><span class="unit">건</span></span></div>
    <div class="stat done"><span class="lbl">승인 완료</span><span><span class="num" id="cDone">0</span><span class="unit">건</span></span></div>
  </div>

  <div class="controls">
    <div class="sec-title" id="dayTitle">금일 작업 현황</div>
    <div class="ctl-right">
      <input type="date" class="dateinput" id="datePick">
      <button class="btn" id="btnToday">오늘</button>
      <button class="btn" id="btnRefresh">↻ 새로고침</button>
      <span class="updated" id="updated">갱신 대기…</span>
    </div>
  </div>

  <div id="errbar"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
/* ===================== 설정 ===================== */
// API는 Supabase 키가 들어있는 bnct-safety 프로젝트에 둔다(여기 safety-dash-board가 아님).
var API_URL = 'https://bnct-safety.vercel.app/api/list-permits';
var REFRESH_MS = 15000;              // 15초마다 자동 갱신
var KST_OFFSET = 9 * 60;             // 한국시간(UTC+9), 분 단위

/* ===================== 시간 유틸 ===================== */
function nowKST(){ return new Date(Date.now() + (KST_OFFSET + new Date().getTimezoneOffset()) * 60000); }
function pad(n){ return String(n).padStart(2,'0'); }
function kstDateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
// 'YYYY-MM-DD'(KST 기준 하루)의 UTC 시작/끝 ISO 반환
function kstDayBoundsUTC(ds){
  var start = new Date(ds + 'T00:00:00+09:00');
  var end   = new Date(start.getTime() + 24*60*60*1000);
  return [start.toISOString(), end.toISOString()];
}
// ISO 문자열 -> KST 'HH:MM'
function isoToKstHM(iso){
  var d = new Date(iso);
  var k = new Date(d.getTime() + (KST_OFFSET + d.getTimezoneOffset()) * 60000);
  return pad(k.getHours())+':'+pad(k.getMinutes());
}

/* ===================== 시계 ===================== */
function tickClock(){
  var k = nowKST();
  document.getElementById('clock').textContent = pad(k.getHours())+':'+pad(k.getMinutes())+':'+pad(k.getSeconds());
  var wd = ['일','월','화','수','목','금','토'][k.getDay()];
  document.getElementById('today').textContent = k.getFullYear()+'년 '+(k.getMonth()+1)+'월 '+k.getDate()+'일 ('+wd+')';
}
setInterval(tickClock, 1000); tickClock();

/* ===================== 데이터 가공 ===================== */
function parseManagers(raw){
  if(!raw) return '—';
  try{
    var v = (typeof raw === 'string') ? JSON.parse(raw) : raw;
    if(Array.isArray(v)){
      return v.map(function(m){ return (m && typeof m==='object') ? (m.name||m.email||'') : m; })
              .filter(Boolean).join('  ·  ') || '—';
    }
    return String(v);
  }catch(e){ return String(raw); }
}
function parsePlace(formFieldsRaw, projectName){
  try{
    var ff = formFieldsRaw ? (typeof formFieldsRaw==='string'? JSON.parse(formFieldsRaw): formFieldsRaw) : {};
    var p = ff && (ff['s1-place'] || ff['s1-work']);
    if(p && String(p).trim()) return String(p).trim();
  }catch(e){}
  return (projectName && projectName.trim()) ? projectName.trim() : '—';
}
function startTime(rec){
  if(rec.submit_date) return String(rec.submit_date).replace(/^\d{4}-\d{2}-\d{2}\s*/,''); // 'HH:MM'만
  if(rec.created_at) return isoToKstHM(rec.created_at);
  return '—';
}
function statusInfo(s){
  if(s === 'signed') return {cls:'done', label:'승인 완료'};
  return {cls:'prog', label:'결재 진행중'};
}
function esc(t){ var d=document.createElement('div'); d.textContent=(t==null?'':t); return d.innerHTML; }

/* ===================== 렌더 ===================== */
var seenTokens = {};   // 새 카드 깜빡임 판별용
var firstLoad = true;

function render(records){
  var grid = document.getElementById('grid');
  var total = records.length, prog = 0, done = 0;

  if(records.length === 0){
    grid.innerHTML = '<div class="empty"><div class="ico">🏗️</div>'+
      '<div class="msg">등록된 외주작업이 없습니다</div>'+
      '<div class="sub">작업허가서가 제출되면 이 화면에 자동으로 표시됩니다</div></div>';
  } else {
    var html = '';
    records.forEach(function(r){
      var st = statusInfo(r.status);
      if(st.cls === 'done') done++; else prog++;
      var company = esc(r.company_name || '(업체명 미입력)');
      var place   = esc(parsePlace(r.form_fields, r.project_name));
      var mgr     = esc(parseManagers(r.managers));
      var time    = esc(startTime(r));
      var people  = r.worker_count ? '<span class="chip">'+esc(r.worker_count)+'명</span>' : '';
      var isNew   = (!firstLoad && r.token && !seenTokens[r.token]) ? ' is-new' : '';
      html +=
      '<div class="card '+st.cls+isNew+'">'+
        '<div class="card-top">'+
          '<div class="company">'+company+'</div>'+
          '<div class="badge '+st.cls+'"><span class="bdot"></span>'+st.label+'</div>'+
        '</div>'+
        '<div class="rows">'+
          '<div class="row"><span class="k">작업장소</span><span class="v">'+place+'</span></div>'+
          '<div class="row"><span class="k">담당자</span><span class="v">'+mgr+'</span></div>'+
          '<div class="row"><span class="k">작업시작</span><span class="v time">'+time+people+'</span></div>'+
        '</div>'+
      '</div>';
    });
    grid.innerHTML = html;
  }

  document.getElementById('cTotal').textContent = total;
  document.getElementById('cProg').textContent  = prog;
  document.getElementById('cDone').textContent  = done;

  // seenTokens 갱신
  var next = {};
  records.forEach(function(r){ if(r.token) next[r.token] = true; });
  seenTokens = next;
  firstLoad = false;
}

/* ===================== 데이터 로드 ===================== */
function selectedDate(){
  var v = document.getElementById('datePick').value;
  return v || kstDateStr(nowKST());
}
function updateDayTitle(){
  var d = selectedDate();
  var todayStr = kstDateStr(nowKST());
  document.getElementById('dayTitle').textContent = (d === todayStr) ? '금일 작업 현황' : d + ' 작업 현황';
}

async function load(){
  updateDayTitle();
  var url = API_URL + '?date=' + encodeURIComponent(selectedDate());
  try{
    var res = await fetch(url, { cache:'no-store' });
    if(!res.ok){ throw new Error('HTTP '+res.status+' '+(await res.text()).slice(0,200)); }
    var json = await res.json();
    if(json && json.success === false){ throw new Error(json.error || '서버 오류'); }
    var data = (json && Array.isArray(json.permits)) ? json.permits : [];
    document.getElementById('errbar').style.display = 'none';
    render(data);
    var k = nowKST();
    document.getElementById('updated').textContent = '최근 갱신 '+pad(k.getHours())+':'+pad(k.getMinutes())+':'+pad(k.getSeconds());
    document.getElementById('liveTxt').textContent = '실시간 연동';
  }catch(err){
    var bar = document.getElementById('errbar');
    bar.style.display = 'block';
    bar.innerHTML = '⚠ 데이터를 불러오지 못했습니다 — '+esc(err.message)+
      '<br>· 이 화면을 배포 주소(bnct-safety.vercel.app/dashboard)로 열었는지, /api/list-permits 가 배포됐는지 확인하세요.';
    document.getElementById('liveTxt').textContent = '연결 오류';
  }
}

/* ===================== 이벤트 / 루프 ===================== */
document.getElementById('datePick').value = kstDateStr(nowKST());
document.getElementById('btnRefresh').addEventListener('click', load);
document.getElementById('btnToday').addEventListener('click', function(){
  document.getElementById('datePick').value = kstDateStr(nowKST()); load();
});
document.getElementById('datePick').addEventListener('change', load);

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
